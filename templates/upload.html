<!-- upload.html -->

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Upload Model</title>
    <!-- Include any necessary CSS files or stylesheets -->
</head>
<body>
    <h2>Upload Model</h2>
    <form method="post" enctype="multipart/form-data">
        {% csrf_token %}
        {{ form.as_p }}
        
        <h3>Input Fields</h3>
        {{ formset.management_form }}
        <div id="input-formset">
            {% for form in formset %}
                {{ form.as_p }}
            {% endfor %}
        </div>
        <button type="button" id="add-input">Add Input Field</button>
        
        <h3>Output Fields</h3>
        {{ outputformset.management_form }}
        <div id="output-formset">
            {% for form in outputformset %}
                {{ form.as_p }}
            {% endfor %}
        </div>
        <button type="button" id="add-output">Add Output Field</button>
        
        <button type="submit">Upload Model</button>
    </form>

    <script>

        //         var outputForm = '<input type="text" name="output_field">';

        //     });
        // });
    </script>
</body>
</html>
