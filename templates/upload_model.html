<form method="post" enctype="multipart/form-data">
    {% csrf_token %}
    {{ form.as_p }}

    <div id="label_names_container"></div> <!-- Ensure this div is present -->

    <h3>Input Fields</h3>
    <div id="input-fields">
        <div class="input-field" id="input-field-template">
            {{ input_field_form.as_p }}
        </div>
    </div>
    <button type="button" onclick="addInputField()">Add Input Field</button>

    <h3>Output Fields</h3>
    <div id="output-fields">
        <div class="output-field" id="output-field-template">
            {{ output_field_form.as_p }}
        </div>
    </div>
    <button type="button" onclick="addOutputField()">Add Output Field</button>

    <h3>Model Source</h3>
    <input type="radio" name="model_source" value="code" id="code" required>
    <label for="code">Code Snippet</label>
    <textarea name="code_snippet" id="code_snippet" rows="10" cols="30"></textarea>

    <input type="radio" name="model_source" value="file" id="file" required>
    <label for="file">File</label>
    <input type="file" name="model_file" id="model_file">

    <button type="submit">Submit</button>
</form>


<script>
function addInputField() {
    inputFieldCount++;
    const template = document.getElementById('input-field-template').cloneNode(true);
    template.style.display = 'block';
    template.id = ''; // Remove the ID to avoid duplicate IDs

    template.querySelectorAll('input, select').forEach(input => {
        let newName = input.name.replace(/input_\d+/, `input_${inputFieldCount}`);
        let newId = input.id.replace(/input_\d+/, `input_${inputFieldCount}`);
        input.name = newName;
        input.id = newId;

        console.log(`Adding input field with name: ${newName} and id: ${newId}`);

        if (input.type === 'checkbox') {
            input.checked = false;
        } else {
            input.value = '';
        }
    });

    document.getElementById('input-fields').appendChild(template);
}

function addOutputField() {
    outputFieldCount++;
    const template = document.getElementById('output-field-template').cloneNode(true);
    template.style.display = 'block';
    template.id = ''; // Remove the ID to avoid duplicate IDs

    template.querySelectorAll('input, select').forEach(input => {
        let newName = input.name.replace(/output_\d+/, `output_${outputFieldCount}`);
        let newId = input.id.replace(/output_\d+/, `output_${outputFieldCount}`);
        input.name = newName;
        input.id = newId;

        console.log(`Adding output field with name: ${newName} and id: ${newId}`);

        if (input.type === 'checkbox') {
            input.checked = false;
        } else {
            input.value = '';
        }
    });

    document.getElementById('output-fields').appendChild(template);
}

    document.addEventListener('DOMContentLoaded', function () {
        const classificationTypeField = document.getElementById('classification_type');
        const numLabelsField = document.getElementById('num_labels');
        const minLabelsField = document.getElementById('min_labels');
        const maxLabelsField = document.getElementById('max_labels');
        const labelNamesContainer = document.getElementById('label_names_container');

        function updateForm() {
            const classificationType = classificationTypeField.value;
            labelNamesContainer.innerHTML = '';
            numLabelsField.disabled = false;
            minLabelsField.disabled = false;
            maxLabelsField.disabled = false;

            if (classificationType === 'multilabel') {
                numLabelsField.addEventListener('input', updateLabelFields);
                minLabelsField.disabled = false;
                maxLabelsField.disabled = false;
            } else if (classificationType === 'multiclass') {
                numLabelsField.addEventListener('input', updateLabelFields);
                minLabelsField.value = 1;
                minLabelsField.disabled = true;
                maxLabelsField.value = 1;
                maxLabelsField.disabled = true;
            } else if (classificationType === 'binary') {
                numLabelsField.value = 2;
                numLabelsField.disabled = true;
                minLabelsField.value = 1;
                minLabelsField.disabled = true;
                maxLabelsField.value = 1;
                maxLabelsField.disabled = true;
                updateLabelFields();
            }
        }

        function updateLabelFields() {
            const classificationType = classificationTypeField.value;
            const numLabels = parseInt(numLabelsField.value, 10); // Ensure integer value

            labelNamesContainer.innerHTML = '';

            if (!isNaN(numLabels)) {
                for (let i = 0; i < numLabels; i++) {
                    const labelInput = document.createElement('input');
                    labelInput.type = 'text';
                    labelInput.name = `label_name_${i}`;
                    labelInput.placeholder = `Label ${i + 1} Name`;
                    labelNamesContainer.appendChild(labelInput);
                }
            }
        }

        classificationTypeField.addEventListener('change', updateForm);
        numLabelsField.addEventListener('input', updateLabelFields);
        updateForm();
    });
</script>
